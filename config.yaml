# ============================================================================
#  BEST TRADING BOT - Configuration (v2 refined)
#  Edit these values to control how the bot behaves. No code changes needed.
# ============================================================================

account:
  # Your total trading capital in INR. Used for position sizing.
  capital: 100000
  # Max % of capital you are willing to LOSE on a single trade (risk per trade).
  # 1% is conservative & recommended for intraday. Never go above ~2%.
  risk_per_trade_pct: 1.0
  # Stop trading for the day once cumulative loss hits this % of capital.
  max_daily_loss_pct: 3.0
  # Max number of simultaneous open positions the bot will suggest.
  max_open_positions: 10      # how many ranked picks each scan/email shows
  # Leverage your broker gives for intraday (MIS). 1 = no leverage.
  intraday_leverage: 1

universe:
  # Which preset list of stocks to scan. Options: nifty50, nifty100, custom
  preset: broad        # nifty50 | nifty100 | midcap | smallcap | broad | custom
  # Used only if preset == custom. NSE symbols WITHOUT the .NS suffix.
  custom_symbols: ["RELIANCE", "TCS", "HDFCBANK", "INFY", "ICICIBANK"]

data:
  # Intraday candle interval. yfinance supports: 1m, 2m, 5m, 15m
  interval: "5m"
  # How many days of intraday history to pull (yfinance limits 1m to ~7d).
  lookback_days: 5
  # Higher timeframe used to confirm the overall trend.
  trend_interval: "15m"

signals:
  # Minimum composite score (0-100) for the bot to surface a BUY/SELL signal.
  min_score: 60
  # Require the higher-timeframe trend to agree with the signal direction.
  require_trend_alignment: true
  # Skip very illiquid moves: minimum 20-period avg volume (shares).
  min_avg_volume: 100000
  # ATR multiplier for stop-loss distance.
  atr_stop_multiplier: 1.5
  # Reward:risk targets. Two targets are produced (partial profit booking).
  target1_rr: 1.5
  target2_rr: 3.0

filters:
  # Apply a basic fundamental quality gate (avoids junk/penny stocks).
  use_fundamental_filter: true
  max_debt_to_equity: 1.5     # reject highly leveraged companies
  min_roe_pct: 10             # reject low-quality businesses
  # Use news-headline sentiment as a tie-breaker / confidence boost.
  use_sentiment: true

schedule:
  # Indian market hours (IST). The live loop only runs inside this window.
  market_open: "09:15"
  market_close: "15:30"
  # Don't take fresh intraday entries after this time (square-off approaches).
  no_new_entries_after: "14:45"
  # Seconds between scans in the live loop.
  scan_interval_seconds: 300

output:
  # Where to write the signal reports.
  report_dir: "reports"
  # Also print a formatted table to the console each scan.
  console: true

# ============================================================================
#  STRATEGY MODE
#  intraday = same-day momentum (needs live 5-min data, smaller moves)
#  swing    = multi-day momentum on DAILY data (bigger moves, more reliable data)
# ============================================================================
mode: swing

swing:
  interval: "1d"
  lookback_days: 400      # ~270 trading days (enough for 100-EMA + momentum)
  min_score: 50           # 0-100; lower = more picks, higher = stricter
  # --- Volatility-adaptive exits (ATR-based; the % fields below are fallbacks) ---
  use_atr_stops: true     # stop = atr_stop_mult x ATR, clamped to min/max % below
  atr_stop_mult: 2.0      # 2x ATR = room to breathe without giving up too much
  min_stop_pct: 1.5       # never tighter than this (avoids noise stop-outs)
  max_stop_pct: 5.0       # never wider than this (caps worst-case loss)
  target1_rr: 1.8         # T1 = 1.8x the stop distance -> book ~half here
  target2_rr: 3.5         # T2 = 3.5x the stop distance -> trail the rest
  gap_chase_pct: 3.0      # dock score if today already gapped this % in our direction
  # --- Fallbacks if use_atr_stops is false ---
  stop_pct: 5             # hard stop, % from entry
  target1_pct: 8          # book ~half here
  target2_pct: 16         # let the rest run
  min_roc_pct: 10         # require >=10% 20-day momentum to qualify
  breakout_lookback: 20   # new N-day high = breakout
  max_hold_days: 15       # exit a swing after this many days if no stop/target
  score_floor: 40         # never show a pick weaker than this, even to fill the list
  use_market_regime: true # only trade WITH the Nifty trend (long in up-markets, short in down)
  core_min_score: 55      # the LOCKED morning picks must clear this (higher = pickier, stronger setups only)
  freshness_penalty: 6    # docked from a name already picked in the last few days, so FRESH names are preferred
  recency_days: 2         # how many days back counts as "recently picked"
  # Exhaustion / mean-reversion overlay: detect overextended moves and dock their
  # score so the bot stops CHASING a name that's stretched and likely to snap back.
  # (This reduces buying tops / shorting bottoms - it does NOT predict exact turns.)
  exhaustion:
    enabled: true
    rsi_overbought: 75    # longs above this RSI are treated as stretched
    rsi_oversold: 25      # shorts below this RSI are treated as stretched
    stretch_atr: 3.0      # price this many ATRs from the 20-EMA = overextended
    div_lookback: 14      # bars back used to detect price/momentum divergence
    max_penalty: 25       # most points the overlay can subtract from a setup's score
  counter_trend_penalty: 10  # score docked from a pick that fights the market trend.
                             # It's a HIGHER BAR, not a ban: a strong counter-trend
                             # short can still make the cut (a weak stock can fall in
                             # an up-market). Auto-tune raises this if trend-fighting
                             # keeps losing; 0 = treat counter-trend like any other.

simulation:
  # "If I put this much in, what would the day's picks make/lose?"
  # Used for the Rs-amount P&L projection on each pick and the EOD email.
  hypothetical_capital: 10000    # Rs put into EACH trade for the P&L email
  daily_goal_pct: 1              # target daily return (1%/day is already elite; 10% was fantasy)
  premarket_count: 8             # CONCENTRATED core: top 8 only - no filler picks diluting winners
  # Track record = the LOCKED core picks only. Midday scans stay informational
  # (emails + dashboard) but don't add paper positions, so stats measure the
  # actual product instead of being diluted by dozens of extra names.
  track_intraday_adds: false

learning:
  # EOD auto-tune: after 4pm the bot reviews the day's losers and nudges its own
  # thresholds (within SAFE limits) so it adapts over time. Every change is logged
  # to reports/learning_log.csv and the live deltas live in reports/learning.json
  # (delete that file to reset to these defaults). Set enabled:false to freeze it.
  enabled: true
  max_step_per_day: 1            # at most one nudge per knob per day (anti-overfit)
  min_score_bounds: [44, 64]     # never push the score filter outside this band
  regime_buffer_bounds: [0.0, 3.0]  # extra % the Nifty must clear before we trust the trend
  counter_trend_penalty_bounds: [0, 25]  # how hard counter-trend picks can be docked

email:
  # Turn this on AFTER you set the two env vars (see README "Email setup").
  enabled: true
  recipient: "arnav.t.srivastava@gmail.com"
  subject_prefix: "Momentum Watchlist"
  smtp_host: "smtp.gmail.com"
  smtp_port: 465
  # Env vars that hold your credentials (never put the password in this file).
  user_env: "GMAIL_USER"               # sender Gmail address
  password_env: "GMAIL_APP_PASSWORD"   # 16-char Google App Password
  # How often `python run.py auto` scans + emails, in hours.
  every_hours: 2
